<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP V8 · Mínimo Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0b;
      --surface: rgba(18,18,18,0.94);
      --surface-soft: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.10);
      --text: #f4f6fb;
      --text-2: #a5afbf;
      --text-3: #6b7585;
      --accent: #f99f35;
      --accent-dim: rgba(249,159,53,0.12);
      --ok: #7ce7c5;
      --danger: #ff9f9f;
      --font: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(900px 480px at 15% -10%, rgba(249,159,53,0.12), transparent 58%),
        linear-gradient(180deg, #090909, #0c0c0c);
      color: var(--text);
      font-family: var(--font);
    }
    body {
      padding: 32px 20px 60px;
    }
    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
    }
    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.02;
      font-weight: 600;
    }
    .sub {
      margin: 0;
      color: var(--text-2);
      max-width: 720px;
      font-size: 15px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text-2);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .btn:hover {
      color: var(--text);
      border-color: rgba(249,159,53,0.28);
      background: rgba(249,159,53,0.08);
      transform: translateY(-1px);
    }
    .btn.primary {
      color: var(--accent);
      border-color: rgba(249,159,53,0.30);
      background: rgba(249,159,53,0.14);
      font-weight: 600;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.30);
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .meta-item {
      border-radius: 20px;
      padding: 16px;
      background: var(--surface-soft);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .meta-item span {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .meta-item strong {
      display: block;
      font-size: 24px;
      color: var(--text);
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
      vertical-align: middle;
    }
    th {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    td strong {
      color: var(--text);
      font-weight: 600;
    }
    .price-input {
      width: 120px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.24);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 11px;
      font-size: 13px;
      font-family: inherit;
    }
    .price-input:focus {
      outline: none;
      border-color: rgba(249,159,53,0.32);
      box-shadow: 0 0 0 3px rgba(249,159,53,0.10);
    }
    .toast {
      margin-top: 16px;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      color: var(--text-2);
    }
    .toast.ok {
      color: var(--ok);
      border-color: rgba(124,231,197,0.18);
      background: rgba(124,231,197,0.08);
    }
    .toast.error {
      color: var(--danger);
      border-color: rgba(255,159,159,0.18);
      background: rgba(255,159,159,0.08);
    }
    @media (max-width: 720px) {
      body { padding: 20px 14px 40px; }
      .card { padding: 16px; border-radius: 22px; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body x-data="minimumDemo()" x-init="init()">
  <div class="shell">
    <div class="hero">
      <div>
        <div class="eyebrow">TOP V8 · Stub externo</div>
        <h1>Preço mínimo à vista</h1>
        <p class="sub">Esse stub simula o sistema externo de margem. Ele grava na chave <code>clinicscale:external-minimum-prices:v1</code> para a TOP V8 importar depois.</p>
      </div>
      <div class="actions">
        <button class="btn" type="button" @click="loadDefaults()">Resetar base 90%</button>
        <button class="btn" type="button" @click="openTopV8()">Ir para TOP V8 →</button>
        <button class="btn primary" type="button" @click="exportToTopV8()">Exportar para TOP V8</button>
      </div>
    </div>

    <div class="card">
      <div class="meta">
        <div class="meta-item">
          <span>Procedimentos</span>
          <strong x-text="items.length"></strong>
        </div>
        <div class="meta-item">
          <span>Soma dos mínimos</span>
          <strong x-text="fmt(items.reduce((sum, item) => sum + item.minPrice, 0))"></strong>
        </div>
        <div class="meta-item">
          <span>Última exportação</span>
          <strong x-text="lastExportLabel"></strong>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tratamento</th>
              <th>Categoria</th>
              <th>Tabela base</th>
              <th>Mínimo à vista</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="item in items" :key="item.name">
              <tr>
                <td><strong x-text="item.name"></strong></td>
                <td x-text="item.category"></td>
                <td x-text="fmt(item.tablePrice)"></td>
                <td>
                  <input class="price-input" type="number" min="0" step="10" x-model.number="item.minPrice">
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div class="toast" :class="toast.kind" x-show="toast.text" x-text="toast.text"></div>
    </div>
  </div>

  <script>
    const EXTERNAL_MINIMUM_STORAGE_KEY = 'clinicscale:external-minimum-prices:v1';
    const MINIMUM_DEMO_DRAFT_KEY = 'top-v8-minimo-demo-draft';
    const CATALOG = [
      { name: 'Implantodontia', items: [
        { name: 'Implante Unitário', tablePrice: 3200 },
        { name: 'Implante Premium (All-on-4)', tablePrice: 8500 },
        { name: 'Enxerto Ósseo', tablePrice: 900 },
        { name: 'Manutenção de Implante', tablePrice: 350 },
      ]},
      { name: 'Estética', items: [
        { name: 'Clareamento Dental', tablePrice: 280 },
        { name: 'Facetas em Resina', tablePrice: 2400 },
        { name: 'Facetas em Porcelana', tablePrice: 3800 },
        { name: 'Harmonização Orofacial', tablePrice: 1200 },
      ]},
      { name: 'Ortodontia', items: [
        { name: 'Aparelho Metálico', tablePrice: 3600 },
        { name: 'Aparelho Transparente', tablePrice: 4800 },
        { name: 'Contenção Fixa', tablePrice: 600 },
      ]},
      { name: 'Reabilitação', items: [
        { name: 'Prótese sobre Implante', tablePrice: 1800 },
        { name: 'Prótese Total', tablePrice: 2200 },
        { name: 'Prótese Parcial Removível', tablePrice: 1400 },
        { name: 'Coroa Unitária', tablePrice: 1100 },
      ]},
      { name: 'Prevenção', items: [
        { name: 'Limpeza Profissional', tablePrice: 180 },
        { name: 'Aplicação de Flúor', tablePrice: 80 },
        { name: 'Selamento de Fissuras', tablePrice: 120 },
      ]},
      { name: 'Cirurgia', items: [
        { name: 'Extração de Siso', tablePrice: 600 },
        { name: 'Frenectomia', tablePrice: 700 },
        { name: 'Exodontia Simples', tablePrice: 280 },
      ]},
    ];

    const FLAT_CATALOG = CATALOG.flatMap(category =>
      category.items.map(item => ({
        category: category.name,
        name: item.name,
        tablePrice: item.tablePrice,
      }))
    );

    function safeNumber(value, fallback = 0) {
      const parsed = parseFloat(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function roundMoney(value) {
      return Math.round(safeNumber(value, 0) * 100) / 100;
    }

    function defaultItems() {
      return FLAT_CATALOG.map(item => ({
        ...item,
        minPrice: roundMoney(item.tablePrice * 0.9),
      }));
    }

    function minimumDemo() {
      return {
        items: defaultItems(),
        toast: { text: '', kind: '' },
        lastExportLabel: 'Nunca',

        fmt(v) {
          return 'R$ ' + Math.round(v || 0).toLocaleString('pt-BR');
        },

        init() {
          try {
            const draftRaw = localStorage.getItem(MINIMUM_DEMO_DRAFT_KEY);
            if (draftRaw) {
              const parsed = JSON.parse(draftRaw);
              if (Array.isArray(parsed?.items)) {
                const map = new Map(parsed.items.map(item => [item.name, item]));
                this.items = FLAT_CATALOG.map(item => ({
                  ...item,
                  minPrice: roundMoney(Math.max(0, safeNumber(map.get(item.name)?.minPrice, item.tablePrice * 0.9))),
                }));
              }
            }
            const exportedRaw = localStorage.getItem(EXTERNAL_MINIMUM_STORAGE_KEY);
            if (exportedRaw) {
              const exported = JSON.parse(exportedRaw);
              if (exported?.exportedAt) {
                this.lastExportLabel = new Date(exported.exportedAt).toLocaleString('pt-BR', {
                  day: '2-digit',
                  month: '2-digit',
                  hour: '2-digit',
                  minute: '2-digit',
                });
              }
            }
          } catch (e) {
            this.toast = { text: 'Não consegui carregar o draft salvo. Recarreguei a base padrão.', kind: 'error' };
            this.items = defaultItems();
          }
          this.$watch('items', () => this.saveDraft(), { deep: true });
        },

        saveDraft() {
          try {
            localStorage.setItem(MINIMUM_DEMO_DRAFT_KEY, JSON.stringify({ items: this.items }));
          } catch (e) {}
        },

        loadDefaults() {
          this.items = defaultItems();
          this.toast = { text: 'Base padrão de 90% da tabela carregada para você editar.', kind: '' };
        },

        exportToTopV8() {
          try {
            const exportedAt = new Date().toISOString();
            const payload = {
              version: 1,
              exportedAt,
              source: 'minimo-demo',
              items: this.items.map(item => ({
                name: item.name,
                category: item.category,
                minPrice: roundMoney(Math.max(0, safeNumber(item.minPrice, 0))),
                updatedAt: exportedAt,
              })),
            };
            localStorage.setItem(EXTERNAL_MINIMUM_STORAGE_KEY, JSON.stringify(payload));
            this.lastExportLabel = new Date(exportedAt).toLocaleString('pt-BR', {
              day: '2-digit',
              month: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
            });
            this.toast = { text: 'Exportado para a TOP V8. Agora você pode abrir a V8 e importar na seção de mínimos.', kind: 'ok' };
          } catch (e) {
            this.toast = { text: 'Falha ao exportar para a TOP V8.', kind: 'error' };
          }
        },

        openTopV8() {
          window.open('top_v8.html', 'top-v8');
        },
      };
    }
  </script>
</body>
</html>
